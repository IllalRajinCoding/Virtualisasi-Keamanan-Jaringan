version: "3.8"

services:

  app1:
    build:
      context: ./app1
    container_name: vdkj_app1

    restart: unless-stopped

    ports:
      - "3000:3000"

    env_file:
      - ./app1/.env

    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - webnet

  app2:
    build:
      context: ./app2
    container_name: vdkj_app2

    restart: unless-stopped

    ports:
      - "3001:3001"

    env_file:
      - ./app2/.env

    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - webnet

networks:
  webnet:
    driver: bridge
